kind = "web"
previewPath = "/"
title = "AI Companion"
version = "1.0.0"
id = "artifacts/ai-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25632

[services.development]
run = "pnpm --filter @workspace/ai-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-companion", "run", "build" ]
publicDir = "artifacts/ai-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25632"
BASE_PATH = "/"
